    <style>
        body {
            font-family: 'Inter', 'Source Han Serif CN', 'Noto Sans SC', sans-serif;
            margin: 0;
            padding: 0;

        }

        .font-serif {
            font-family: 'Source Han Serif CN', 'Noto Serif SC', serif;
        }

        /* Strict 16:9 Aspect Ratio Container */
        .dashboard-container {
            width: 100vw;
            height: 56.25vw;
            /* 9/16 = 0.5625 */
            max-height: 100vh;
            max-width: 177.78vh;
            /* 16/9 = 1.7778 */
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #131313;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
        }

        .font-space {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-panel {
            background: rgba(53, 53, 53, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #131313;
        }

        ::-webkit-scrollbar-thumb {
            background: #353535;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #c70019;
        }

        /* Iron Pulse Table Optimization */
        table {

            width: 100%;
        }

        th,
        td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;

</head>

    <script>
        async function fetchTableData() {
            try {
                const teamFilter = document.getElementById('team-filter');
                const team = teamFilter ? teamFilter.value : '';

                let url = '/api/table-data';
                if (team) url += '?team=' + encodeURIComponent(team);

                const response = await fetch(url);
                const data = await response.json();

                // 确保数据结构正确
                if (data && data.table_data) {
                    renderTable(data.table_data);
                }
                if (data && data.summary) {
                    renderSummary(data.summary);
                }
            } catch (error) {
                console.error('Error fetching table data:', error);
            }
        }

        function renderSummary(summary) {
            if (!summary) return;

            // 安全获取数值
            const getVal = (val) => (val !== undefined && val !== null) ? val : 0;

            // 更新今日概况数字
            document.getElementById('today-scheduled').textContent = getVal(summary.today_scheduled);
            document.getElementById('today-completed').textContent = getVal(summary.today_completed);
            document.getElementById('today-remaining').textContent = getVal(summary.today_remaining);

            // 更新本月指标
            const monthBeatRateEl = document.getElementById('month-beat-rate');
            const monthOnTimeRateEl = document.getElementById('month-on-time-rate');
            if (monthBeatRateEl) monthBeatRateEl.textContent = getVal(summary.month_beat_rate).toFixed(1);
            if (monthOnTimeRateEl) monthOnTimeRateEl.textContent = getVal(summary.month_on_time_rate).toFixed(1);

            // 更新本日指标
            const todayBeatRateEl = document.getElementById('today-beat-rate');
            const todayOnTimeRateEl = document.getElementById('today-on-time-rate');
            if (todayBeatRateEl) todayBeatRateEl.textContent = getVal(summary.today_beat_rate).toFixed(1);
            if (todayOnTimeRateEl) todayOnTimeRateEl.textContent = getVal(summary.today_on_time_rate).toFixed(1);

            // 更新趋势图
            if (summary.last_7_days_beat && summary.last_7_days_beat.length > 0) {
                updateTrendChart('beat', summary.last_7_days_beat);
            }
            if (summary.last_7_days_on_time && summary.last_7_days_on_time.length > 0) {
                updateTrendChart('ontime', summary.last_7_days_on_time);
            }

            // 更新进度条
            const progress = summary.today_scheduled > 0
                ? (summary.today_completed / summary.today_scheduled) * 100
                : 0;
            document.getElementById('today-progress').style.width = `${progress}%`;

            // 更新任务队列状态统计 (如果页面上有对应的ID)
            const overdueEl = document.getElementById('summary-overdue');
            const inProgressEl = document.getElementById('summary-in-progress');
            const pendingEl = document.getElementById('summary-pending');
            const totalCountEl = document.getElementById('total-count');

            if (overdueEl) overdueEl.textContent = `已超时 (${getVal(summary.overdue)})`;
            if (inProgressEl) inProgressEl.textContent = `执行中 (${getVal(summary.in_progress)})`;
            if (pendingEl) pendingEl.textContent = `待开工 (${getVal(summary.pending)})`;
            if (totalCountEl) totalCountEl.textContent = getVal(summary.total_count);
        }

        function updateTrendChart(type, data) {
            const pathId = type === 'beat' ? 'beat-trend-path' : 'ontime-trend-path';
            const areaId = type === 'beat' ? 'beat-trend-area' : 'ontime-trend-area';
            const labelsId = type === 'beat' ? 'beat-trend-labels' : 'ontime-trend-labels';

            const pathEl = document.getElementById(pathId);
            const areaEl = document.getElementById(areaId);
            const labelsContainer = document.getElementById(labelsId);

            if (!pathEl || !areaEl || !labelsContainer) return;

            // 计算SVG路径点
            // SVG viewbox is 360x100. 
            // Y=0 is top, Y=100 is bottom. 
            // We map 0-100% rate to Y=100-0 (inverted).
            const width = 360;
            const height = 100;
            const paddingX = 0; // Full width usage

            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * width;
                const y = height - (d.rate / 100 * height);
                return `${x},${y}`;
            });

            const pathD = `M${points.join(' L')}`;
            const areaD = `${pathD} V${height} H0 Z`;

            pathEl.setAttribute('d', pathD);
            areaEl.setAttribute('d', areaD);

            // 更新标签
            const maxRate = Math.max(...data.map(d => d.rate));
            const isMax = (idx) => data[idx].rate === maxRate;
            const primaryClass = 'text-primary-container font-bold';
            const defaultClass = 'text-white';

            labelsContainer.innerHTML = data.map((d, i) => `
                <div class="flex flex-col items-center"> 
                    <span class="text-[14px] font-space ${isMax(i) ? primaryClass : defaultClass}">${d.rate}</span>
                    <span class="text-[14px] mt-2 font-space ${isMax(i) ? primaryClass : defaultClass}">${d.date}</span>
                </div>
            `).join('');
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.map(row => `
                <tr class="hover:bg-surface-container-high transition-colors ${row.is_pending ? 'text-primary-container font-bold' : ''}">
                    <td class="px-6 py-3">
                        <span class="${row.status_class} text-[14px] font-black px-1.5 py-0.5 font-label">${row.status}</span>
                    </td>
                    <td class="px-4 py-3 text-[14px] font-bold font-space tracking-wide text-on-surface">${row.project}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.train_no}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.car_no}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.process_code}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.process_name}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.plan_start}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.plan_end}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide ${row.is_overtime ? 'text-primary-container font-bold' : 'text-on-surface'}">${row.actual_start}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide ${row.is_overtime ? 'text-primary-container font-bold' : 'text-on-surface'}">${row.actual_end}</td>
                    <td class="px-4 py-3 text-[14px] font-space tracking-wide text-on-surface">${row.scheduled_duration}</td>
                    <td class="px-6 py-3 text-right text-xs font-space tracking-wide text-on-surface ${row.is_overtime ? 'text-primary-container font-bold' : ''}">${row.execution_duration}</td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchTableData();
            updateTime();
            setInterval(updateTime, 1000);

            const teamFilter = document.getElementById('team-filter');
            if (teamFilter) {
                teamFilter.addEventListener('change', fetchTableData);
            }
        });

        function updateTime() {
            const timeElement = document.getElementById('system-time');
            if (timeElement) {
                const now = new Date();
                const year = now.getFullYear();
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const day = now.getDate().toString().padStart(2, '0');
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                timeElement.textContent = `${year}.${month}.${day} ${hours}:${minutes}:${seconds}`;
            }
        }
    </script>
</body>

</html>
